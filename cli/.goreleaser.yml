version: 2

project_name: newbrew

before:
  hooks:
    - go mod tidy

builds:
  - id: newbrew
    main: .
    binary: newbrew
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

changelog:
  use: github

brews:
  - repository:
      owner: matt-riley
      name: homebrew-tools
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: https://github.com/matt-riley/newbrew
    description: Browse and inspect new Homebrew formulae from your terminal
