name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  # Queue release runs so a newer push cannot cancel an in-flight GoReleaser
  # publish before the Homebrew tap update lands.
  group: ${{ github.workflow }}:${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release-please:
    uses: matt-riley/matt-riley-ci/.github/workflows/release-please.yml@071c2c2bbe410f73126d3cefd0a0b6812b3565f6 # v2
    with:
      config-file: release-please-config.json
      manifest-file: .release-please-manifest.json
      component-output-key: cli
    secrets:
      token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}

  goreleaser:
    needs: release-please
    if: ${{ needs.release-please.outputs.component_release_created == 'true' }}
    uses: matt-riley/matt-riley-ci/.github/workflows/go-goreleaser.yml@0d1d8e7a149a53fcaaca6e128f62e0e3d8fdf293 # v2
    with:
      go-version-file: cli/go.mod
      working-directory: cli
    secrets:
      github-token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
      homebrew-tap-token: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN || secrets.RELEASE_PLEASE_TOKEN }}
