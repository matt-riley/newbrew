name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    uses: matt-riley/matt-riley-ci/.github/workflows/go-ci.yml@7bf33bf0eef269c4a4b1d85e1668dec14fb8ffff # v1
    with:
      go-version-file: cli/go.mod
      working-directory: cli
      run-fmt: true

  lint:
    uses: matt-riley/matt-riley-ci/.github/workflows/go-lint.yml@7bf33bf0eef269c4a4b1d85e1668dec14fb8ffff # v1
    with:
      go-version-file: cli/go.mod
      working-directory: cli

  govulncheck:
    needs: lint
    uses: matt-riley/matt-riley-ci/.github/workflows/go-security.yml@7bf33bf0eef269c4a4b1d85e1668dec14fb8ffff # v1
    with:
      go-version-file: cli/go.mod
      working-directory: cli
