name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  packages: read

jobs:
  ci:
    uses: matt-riley/matt-riley-ci/.github/workflows/ci.yml@0d1d8e7a149a53fcaaca6e128f62e0e3d8fdf293 # v2
    with:
      build: true
      test: true
      vet: true
      fmt: true
      lint: true
      concurrency-suffix: ci

  govulncheck:
    needs: ci
    if: ${{ always() }}
    uses: matt-riley/matt-riley-ci/.github/workflows/go-security.yml@0d1d8e7a149a53fcaaca6e128f62e0e3d8fdf293 # v2
    with:
      go-version-file: cli/go.mod
      working-directory: cli
      concurrency-suffix: security

  coverage:
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: cli/go.mod
          cache: true
      - name: Run tests with coverage
        working-directory: cli
        run: |
          go test -race -coverprofile=coverage.out ./...
          go tool cover -func=coverage.out
      - name: Enforce coverage threshold
        working-directory: cli
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | tail -1 | awk '{print $3}' | sed 's/%//')
          THRESHOLD=70
          echo "Total coverage: ${COVERAGE}%"
          if (( $(echo "$COVERAGE < $THRESHOLD" | bc -l) )); then
            echo "Coverage ${COVERAGE}% is below threshold ${THRESHOLD}%"
            exit 1
          fi
          echo "Coverage threshold met."
